{% extends "base.html" %}

{% block title %}Delete video{% endblock %}

{% block content %}
<div class="flex min-h-screen items-center justify-center p-4">
    <form method="post" class="card w-full max-w-sm bg-base-100 p-6 shadow-sm flex flex-col gap-4">
        {% csrf_token %}
        <h1 class="text-xl font-semibold">Delete "{{ object.title }}"?</h1>
        <div class="flex gap-2">
            <button type="submit" class="btn btn-error">Delete</button>
            <a href="{% url 'comprehensible_input:video_manage' %}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
