{% extends "base.html" %}

{% block title %}Comprehensible Input{% endblock %}

{% block content %}
<div class="min-h-screen p-4">
    <div class="mb-4 flex justify-end max-w-2xl mx-auto">
        <a href="{% url 'comprehensible_input:stats' %}" class="btn btn-sm btn-outline">Stats</a>
    </div>
    <div class="flex flex-col items-center gap-6">
        <h1 class="text-2xl font-bold">Pick a language</h1>
        <div class="flex flex-col gap-2 w-full max-w-xs">
            {% for language in languages %}
                <a href="{% url 'comprehensible_input:video_list' language.pk %}" class="btn btn-primary">{{ language.name }}</a>
            {% empty %}
                <p class="text-center opacity-70">No languages with videos yet.</p>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
