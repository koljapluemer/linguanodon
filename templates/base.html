<!DOCTYPE html>
<html lang="en" data-theme="light">
{%load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Linguanodon{% endblock %}</title>
    {% if favicon_url %}
    <link rel="icon" type="image/svg+xml" href="{{ favicon_url }}">
    {% else %}
    <link rel="icon" href="{% static 'core/favicon.ico' %}" type="image/x-icon">
    {% endif %}
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@1.16.0/dist/umd/lucide.js"></script>
</head>

<body class="flex min-h-screen flex-col bg-base-200" data-authenticated="{{ user.is_authenticated|yesno:'true,false' }}">
    <div class="navbar bg-base-100 shadow-sm px-4">
        <a href="{% url 'index' %}"  class="flex-1 flex flex gap-4 flex-row items-center">
            <img src="{% static 'core/logo.webp' %}" alt="" class="h-12 object-contain">
            <span class="hidden md:block link link-hover">Linguanodon</span>
        </a>
        <div class="flex-none flex items-center gap-4">
            {% if user.is_authenticated %}
            <a href="{% url 'tracking:dashboard' %}" class="link">Activity</a>
            <a href="{% url 'accounts:profile' %}" class="link">{{ user.username }}</a>
            {% else %}
            <a href="{% url 'accounts:login' %}" class="link">Sign in</a>
            <a href="{% url 'accounts:signup' %}" class="link">Sign up</a>
            {% endif %}
        </div>
    </div>
    {% block content %}{% endblock %}
</body>

</html>
