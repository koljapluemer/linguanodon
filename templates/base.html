<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Linguanodon{% endblock %}</title>
    {% if favicon_url %}
    <link rel="icon" type="image/svg+xml" href="{{ favicon_url }}">{% endif %}
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@1.16.0/dist/umd/lucide.js"></script>
</head>
{%load static %}

<body class="min-h-screen bg-base-200" data-authenticated="{{ user.is_authenticated|yesno:'true,false' }}">
    <div class="navbar bg-base-100 shadow-sm px-4">
        <div class="flex-1">
            <img src="{% static 'core/logo.webp' %}" alt="" class="h-12 object-contain">
            <a href="{% url 'index' %}" class="hidden md:block btn btn-ghost text-lg">Linguanodon</a>
        </div>
        <div class="flex-none flex items-center gap-2">
            {% if user.is_authenticated %}
            <a href="{% url 'tracking:dashboard' %}" class="btn btn-sm btn-ghost">Activity</a>
            <span class="text-sm opacity-70">{{ user.username }}</span>
            <form method="post" action="{% url 'accounts:logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline">Sign out</button>
            </form>
            {% else %}
            <a href="{% url 'accounts:login' %}" class="btn btn-sm btn-outline">Sign in</a>
            <a href="{% url 'accounts:signup' %}" class="btn btn-sm btn-primary">Sign up</a>
            {% endif %}
        </div>
    </div>
    {% block content %}{% endblock %}
</body>

</html>
