{% extends "base.html" %}
{% load static %}

{% block title %}Vietnamese Tone Practice{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'viettonepractice/css/style.css' %}">
<div class="min-h-screen p-4">
  <div class="mb-4 flex justify-end max-w-4xl mx-auto">
    <a href="{% url 'viettonepractice:stats' %}" class="btn btn-sm btn-outline">Stats</a>
  </div>
  <div id="app"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/vue@3.5.27/dist/vue.global.prod.js"></script>
<script id="viettonepractice-config" type="application/json">{{ config_json|safe }}</script>
<script type="module" src="{% static 'viettonepractice/js/main.js' %}"></script>
{% endblock %}
