{% if app_info %}
<div class="max-w-4xl mx-auto px-4 py-10 text-center">
    <h1 class="text-3xl font-bold">{{ app_info.name }}</h1>
    <span class="badge {{ app_info.state.badge_class }} mt-2">{{ app_info.state.value }}</span>
    <p class="mt-4 opacity-70">{{ app_info.description }}</p>
    <p class="text-sm opacity-60 mt-1"><span class="font-medium">Languages:</span> {{ app_info.languages }}</p>
    {% if app_info.practice_url_name %}
    <div class="mt-6">
        <a href="{% url app_info.practice_url_name %}" class="btn btn-primary">Start practicing</a>
    </div>
    {% endif %}
</div>
{% endif %}
