{% extends 'base.html' %}
{% load static %}

{% block title %}Your activity — Linguanodon{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'core/css/chart-theme.css' %}">

<div class="chart-theme max-w-4xl mx-auto p-6 space-y-10">
  <div>
    <h1 class="text-2xl font-semibold" style="color: var(--text-primary)">Your activity</h1>
    <p class="text-sm mt-1" style="color: var(--text-secondary)">Last 30 days, across every app.</p>
  </div>

  <section id="trials-chart-section" aria-label="Trials per day per app"></section>
  <section id="active-time-chart-section" aria-label="Active minutes per day per app"></section>
</div>

<script id="tracking-dashboard-data" type="application/json">{{ data_json|safe }}</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.js"></script>
<script type="module" src="{% static 'tracking/js/dashboard.js' %}"></script>
{% endblock %}
