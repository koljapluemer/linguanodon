{% extends "base.html" %}
{% load static %}

{% block title %}Vietnamese Typing Practice{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen gap-6 p-4">
    <h1 class="text-3xl font-bold">Vietnamese Typing Practice</h1>

    <div class="join" id="method-toggle">
        <button type="button" class="btn join-item" data-method="off">Off</button>
        <button type="button" class="btn join-item" data-method="telex">TELEX</button>
        <button type="button" class="btn join-item" data-method="vni">VNI</button>
    </div>

    <div class="stats shadow bg-base-100">
        <div class="stat place-items-center">
            <div class="stat-title">WPM</div>
            <div class="stat-value text-primary" id="stat-wpm">0</div>
        </div>
        <div class="stat place-items-center">
            <div class="stat-title">Accuracy</div>
            <div class="stat-value text-secondary" id="stat-accuracy">100%</div>
        </div>
        <div class="stat place-items-center">
            <div class="stat-title">Time</div>
            <div class="stat-value" id="stat-time">0s</div>
        </div>
    </div>

    <div class="card bg-base-100 shadow-xl w-full max-w-3xl">
        <div class="card-body">
            <div id="text-display" class="flex flex-col gap-6 select-none"></div>
        </div>
    </div>

    <input id="typing-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
           class="input input-bordered input-lg w-full max-w-3xl text-center" placeholder="Start typing..." autofocus>
</div>

<script id="typingpractice-config" type="application/json">{{ config_json|safe }}</script>
<script type="module" src="{% static 'typingpractice/js/main.js' %}"></script>
{% endblock %}
