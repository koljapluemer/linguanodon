{% extends "base.html" %}

{% block title %}Vietnamese Typing Practice{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-screen gap-6 p-4">
    <h1 class="text-3xl font-bold">Vietnamese Typing Practice</h1>

    <div class="stats shadow bg-base-100">
        <div class="stat place-items-center">
            <div class="stat-title">WPM</div>
            <div class="stat-value text-primary" id="stat-wpm">0</div>
        </div>
        <div class="stat place-items-center">
            <div class="stat-title">Accuracy</div>
            <div class="stat-value text-secondary" id="stat-accuracy">100%</div>
        </div>
        <div class="stat place-items-center">
            <div class="stat-title">Time</div>
            <div class="stat-value" id="stat-time">0s</div>
        </div>
    </div>

    <div class="card bg-base-100 shadow-xl w-full max-w-3xl">
        <div class="card-body">
            <div id="text-display" class="flex flex-col gap-6 select-none"></div>
        </div>
    </div>

    <input id="typing-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
           class="input input-bordered input-lg w-full max-w-3xl text-center" placeholder="Start typing..." autofocus>
</div>

<script id="words-data" type="application/json">{{ words_json|safe }}</script>
<script>
(function () {
    const WORDS_PER_LINE = 3;
    const IDLE_TIMEOUT_MS = 10000;

    const wordPairs = JSON.parse(document.getElementById('words-data').textContent);

    const textDisplay = document.getElementById('text-display');
    const input = document.getElementById('typing-input');
    const wpmEl = document.getElementById('stat-wpm');
    const accEl = document.getElementById('stat-accuracy');
    const timeEl = document.getElementById('stat-time');

    let allLines = [];
    let lineIndex = 0;
    let currentLine = [];
    let nextLine = [];
    let target = '';
    let totalKeystrokes = 0;
    let mistakes = 0;
    let completedWords = 0;

    // Timer: accumulates only while the tab is visible and typing is active.
    let elapsedMs = 0;
    let runStart = null;
    let lastKeyTime = 0;

    function resumeTimer() {
        if (runStart === null && !document.hidden) {
            runStart = Date.now();
        }
    }

    function pauseTimer() {
        if (runStart !== null) {
            elapsedMs += Date.now() - runStart;
            runStart = null;
        }
    }

    function currentElapsedMs() {
        return elapsedMs + (runStart !== null ? Date.now() - runStart : 0);
    }

    function chunk(arr, size) {
        const chunks = [];
        for (let i = 0; i < arr.length; i += size) chunks.push(arr.slice(i, i + size));
        return chunks;
    }

    function nextChunk() {
        const line = allLines[lineIndex % allLines.length];
        lineIndex++;
        return line;
    }

    function renderLine(lineWords, typed, active) {
        let html = '<div class="flex justify-center gap-8">';
        let offset = 0;
        lineWords.forEach(([vie, eng]) => {
            html += '<div class="flex flex-col items-center gap-1">';
            html += '<span class="font-mono text-2xl tracking-wide">';
            for (let i = 0; i < vie.length; i++) {
                const idx = offset + i;
                const char = vie[i];
                if (active && idx < typed.length) {
                    html += `<span class="${typed[idx] === char ? 'text-success' : 'text-error underline'}">${char}</span>`;
                } else if (active && idx === typed.length) {
                    html += `<span class="bg-primary/30 rounded">${char}</span>`;
                } else {
                    html += `<span class="text-base-content/40">${char}</span>`;
                }
            }
            html += '</span>';
            html += `<span class="text-xs opacity-60">${eng}</span>`;
            html += '</div>';
            offset += vie.length + 1;
        });
        html += '</div>';
        return html;
    }

    function renderLines() {
        textDisplay.innerHTML = renderLine(currentLine, input.value, true) + renderLine(nextLine, '', false);
    }

    function tick() {
        if (runStart !== null && Date.now() - lastKeyTime > IDLE_TIMEOUT_MS) {
            pauseTimer();
        }
        const elapsedMin = currentElapsedMs() / 60000;
        const typedInLine = input.value.trim().length > 0 ? input.value.trim().split(/\s+/).length : 0;
        const typedWords = completedWords + typedInLine;
        wpmEl.textContent = elapsedMin > 0 ? Math.round(typedWords / elapsedMin) : 0;
        const accuracy = totalKeystrokes > 0
            ? Math.max(0, Math.round(((totalKeystrokes - mistakes) / totalKeystrokes) * 100))
            : 100;
        accEl.textContent = accuracy + '%';
        timeEl.textContent = Math.round(currentElapsedMs() / 1000) + 's';
    }

    function shiftLines() {
        completedWords += currentLine.length;
        currentLine = nextLine;
        nextLine = nextChunk();
        target = currentLine.map(([vie]) => vie).join(' ');
        input.value = '';
        renderLines();
    }

    function start() {
        allLines = chunk(wordPairs, WORDS_PER_LINE);
        lineIndex = 0;
        currentLine = nextChunk();
        nextLine = nextChunk();
        target = currentLine.map(([vie]) => vie).join(' ');
        input.value = '';
        renderLines();
        input.focus();
        setInterval(tick, 500);
    }

    input.addEventListener('keydown', (e) => {
        if (e.key.length === 1) {
            lastKeyTime = Date.now();
            resumeTimer();
            totalKeystrokes++;
            if (target[input.value.length] !== e.key) mistakes++;
        }
    });

    input.addEventListener('input', () => {
        if (input.value.length >= target.length) {
            shiftLines();
        } else {
            renderLines();
        }
    });

    document.addEventListener('visibilitychange', () => {
        if (document.hidden) pauseTimer();
    });

    start();
})();
</script>
{% endblock %}
